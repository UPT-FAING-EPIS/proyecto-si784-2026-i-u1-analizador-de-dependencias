name: Pages Documentation and Reports

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx2g -XX:MaxMetaspaceSize=512m"
      OSS_INDEX_TOKEN: ${{ secrets.OSS_INDEX_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: integrations/mcp/package-lock.json

      - name: Prepare Gradle
        run: chmod +x gradlew

      - name: Run unit and integration tests
        run: ./gradlew test

      - name: Build application
        run: ./gradlew assemble

      - name: Run mutation tests
        continue-on-error: true
        timeout-minutes: 10
        run: ./gradlew pitest

      - name: Generate Dokka documentation
        continue-on-error: true
        timeout-minutes: 10
        run: ./gradlew dokkaGenerate

      - name: Test MCP server
        working-directory: integrations/mcp
        run: npm ci && npm test

      - name: Run Semgrep
        continue-on-error: true
        timeout-minutes: 10
        uses: semgrep/semgrep-action@v1
        with:
          generateSarif: "1"

      - name: Run Snyk
        if: ${{ secrets.SNYK_TOKEN != '' }}
        continue-on-error: true
        timeout-minutes: 10
        uses: snyk/actions/gradle@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --json-file-output=build/reports/snyk/snyk.json

      - name: Run Sonar
        if: ${{ secrets.SONAR_TOKEN != '' }}
        continue-on-error: true
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar

      - name: Build Pages site
        run: |
          python -m pip install --user markdown
          python scripts/build-pages.py

      - name: Collect generated reports
        shell: bash
        run: |
          mkdir -p build/pages-site/reports/unit
          cp -R build/reports/tests/test/* build/pages-site/reports/unit/ || true
          mkdir -p build/pages-site/reports/integration
          cp -R build/reports/tests/test/* build/pages-site/reports/integration/ || true
          mkdir -p build/pages-site/reports/interface
          cp -R build/reports/tests/test/* build/pages-site/reports/interface/ || true
          mkdir -p build/pages-site/reports/mutation
          cp -R build/reports/pitest/* build/pages-site/reports/mutation/ || true
          mkdir -p build/pages-site/reports/snyk
          cp -R build/reports/snyk/* build/pages-site/reports/snyk/ || true
          mkdir -p build/pages-site/api-docs
          cp -R build/dokka/html/* build/pages-site/api-docs/ || true
          cp -R build/dokka/htmlPartial/* build/pages-site/api-docs/ || true
          cp -R build/dokka/dokkaGeneratePublicationHtml/* build/pages-site/api-docs/ || true
          cp -R build/dokka/dokkaGenerateModuleHtml/* build/pages-site/api-docs/ || true
          mkdir -p build/pages-site/reports/bdd
          cat > build/pages-site/reports/bdd/index.html <<'HTML'
          <!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Pruebas BDD</title><link rel="stylesheet" href="../../assets/site.css"></head><body><main class="page"><h1>Pruebas BDD</h1><p>Escenarios BDD documentados para flujos principales de CLI: analizar proyecto, exportar JSON y simular actualización.</p></main></body></html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
