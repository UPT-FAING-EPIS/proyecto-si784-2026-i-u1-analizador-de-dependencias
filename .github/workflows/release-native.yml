name: Native Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            archive_ext: tar.gz
          - os: macos-latest
            os_name: macos
            archive_ext: tar.gz
          - os: windows-latest
            os_name: windows
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "25"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Build native image (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x gradlew
          ./gradlew nativeCompile

      - name: Build native image (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat nativeCompile

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) arch="x64" ;;
            arm64|aarch64) arch="arm64" ;;
            *)
              echo "Unsupported architecture: $arch"
              exit 1
              ;;
          esac

          binary="build/native/nativeCompile/depanalyzer"
          if [ ! -f "$binary" ]; then
            echo "Native binary not found at $binary"
            exit 1
          fi

          chmod +x "$binary"
          asset_name="depanalyzer-${{ matrix.os_name }}-${arch}.${{ matrix.archive_ext }}"
          tar -C "build/native/nativeCompile" -czf "dist/${asset_name}" "depanalyzer"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $arch = $env:PROCESSOR_ARCHITECTURE
          if ($arch -eq "AMD64") {
            $arch = "x64"
          } elseif ($arch -eq "ARM64") {
            $arch = "arm64"
          } else {
            Write-Error "Unsupported architecture: $arch"
            exit 1
          }

          $binary = "build/native/nativeCompile/depanalyzer.exe"
          if (-not (Test-Path $binary)) {
            Write-Error "Native binary not found at $binary"
            exit 1
          }

          $assetName = "depanalyzer-${{ matrix.os_name }}-$arch.${{ matrix.archive_ext }}"
          Compress-Archive -Path $binary -DestinationPath "dist/$assetName" -Force

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./build/native/nativeCompile/depanalyzer --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\build\native\nativeCompile\depanalyzer.exe --help

      - name: Upload packaged native binary
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os_name }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
